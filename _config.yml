name: "Sencan Sun"
title: "Doctoral Student in Atmospheric Science"
institution: "Department of Earth System Science, Tsinghua University"
email: ssc23@mails.tsinghua.edu.cn
photo: sunsencan.png

links:
  google_scholar: ""
  github: "https://github.com/sunmoumou1"
  researchgate: ""
  orcid: ""
  twitter: ""
  linkedin: ""
  cv: ""

accent_color: "#1f7a8c"
dark_mode: true
description: "Academic webpage of Sencan Sun, a doctoral student at Tsinghua University working on AI methods for weather forecasting, data assimilation, and climate prediction."
baseurl: ""
url: "https://shepherdchinacan.github.io"

analytics:
  google_id: ""

nav_pages:
  - name: about
  - name: publications
  - name: research
  - name: software
  - name: activities
  - name: blogs

timezone: Asia/Shanghai
future: true
permalink: /:categories/:title/

include:
  - .htaccess
  - _pages

sass:
  quiet_deps: true
  style: compressed

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true

plugins: ["jekyll/scholar"]

scholar:
  last_name: Sun
  first_name: [Sencan]
  style: citesty
  locale: en
  source: /assets/
  bibliography: ref.bib
  bibliography_template: bibtemplate
  sort_by: year, month
  order: descending
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"
  bibliography_list_attributes:
    reversed: "reversed"

google_verify: "SkiyuGpJOKT74vv5GmXLvYXXDkXy4v8VWPtbelYz3Hs"

exclude:
  - academic-website-template-source
  - backup
  - Gemfile.lock
  - node_modules
  - package-lock.json
  - docs
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - _site
